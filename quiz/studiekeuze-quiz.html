      { text: "Ja! Zeker als ik mijn eigen ideeën kan inbrengen", tags: ["id"] },
      { text: "Graag, bij strategische of data-vraagstukken", tags: ["bdm"] },
      { text: "Absoluut — beveiligingsprojecten klinken geweldig", tags: ["ism"] },
      { text: "Zeker, netwerk- en systeemprojecten in de praktijk", tags: ["nse"] }
    ]
  },
  {
    text: "Wat wil je over 5 jaar gezegd kunnen hebben?",
    options: [
      { text: "Ik heb software gebouwd die echt door mensen gebruikt wordt", tags: ["se"] },
      { text: "Ik heb een eigen product of startup gelanceerd", tags: ["id"] },
      { text: "Ik help bedrijven groeien met data en digitale strategie", tags: ["bdm"] },
      { text: "Ik bescherm kritieke systemen tegen cyberdreigingen", tags: ["ism"] },
      { text: "Ik beheer de IT-infrastructuur van een grote organisatie", tags: ["nse"] }
    ]
  }
];

const tracks = {
  se: {
    code: "SE",
    label: "Software Engineering",
    location: "Locatie: Den Haag",
    desc: "Je bouwt van A tot Z softwareapplicaties — van mobiele apps tot webplatformen. Programmeren, software-architectuur en agile werken staan centraal.",
    color: "#1a6dc5",
    bg: "#deeaf9",
    textColor: "#0a3d6b",
    barColor: "#1a6dc5",
    skills: ["Java / Python", "Web development", "Agile/Scrum", "Software-architectuur"]
  },
  id: {
    code: "ID",
    label: "Innovative Development",
    location: "Locatie: Zoetermeer",
    desc: "Je combineert techniek met creativiteit en ondernemerschap. Je bedenkt en bouwt innovatieve digitale producten en diensten, van idee tot prototype.",
    color: "#c17d10",
    bg: "#fef0d6",
    textColor: "#7a4200",
    barColor: "#c17d10",
    skills: ["Design thinking", "Prototyping", "Ondernemerschap", "UX & innovatie"]
  },
  bdm: {
    code: "BDM",
    label: "Business & Data Management",
    location: "Locatie: Den Haag",
    desc: "Je verbindt ICT met bedrijfskunde. Je analyseert data, optimaliseert processen en helpt organisaties slimmer werken met digitale technologie.",
    color: "#217a3c",
    bg: "#e2f4e8",
    textColor: "#145226",
    barColor: "#217a3c",
    skills: ["Data-analyse", "SQL / Power BI", "Business processen", "IT-management"]
  },
  ism: {
    code: "ISM",
    label: "Information Security Management",
    location: "Locatie: Zoetermeer",
    desc: "Je bent de digitale bewaker. Je leert systemen ethisch te hacken, kwetsbaarheden op te sporen en beveiligingsbeleid te ontwerpen voor organisaties.",
    color: "#c0392b",
    bg: "#fde8e6",
    textColor: "#7b1f1a",
    barColor: "#c0392b",
    skills: ["Ethical hacking", "Risicoanalyse", "Netwerkbeveiliging", "Forensics"]
  },
  nse: {
    code: "NSE",
    label: "Network & Systems Engineering",
    location: "Locatie: Delft",
    desc: "Je bouwt en beheert de technische ruggengraat van organisaties — netwerken, servers, cloudplatformen en embedded systemen.",
    color: "#6b3fcb",
    bg: "#ece5fb",
    textColor: "#3d2080",
    barColor: "#6b3fcb",
    skills: ["Networking (Cisco)", "Linux / Windows Server", "Cloud (AWS/Azure)", "Systeembeheer"]
  }
};

let current = 0;
let answers = new Array(questions.length).fill(null);
let studentFirstName = '';
let studentLastName = '';

function render() {
  const app = document.getElementById('app');
  if (!studentFirstName) {
    renderNameScreen(app);
  } else if (current < questions.length) {
    renderQuestion(app);
  } else {
    renderResult(app);
  }
}

function renderNameScreen(app) {
  app.innerHTML = `
    <div class="name-wrap">
      <h2>Welkom bij de HBO-ICT Studiekeuze Quiz</h2>
      <p>Vul eerst je naam in. Deze wordt gebruikt op jouw persoonlijk rapport dat je na afloop kunt downloaden.</p>
      <div class="name-row">
        <div class="name-field">
          <label for="firstName">Voornaam</label>
          <input type="text" id="firstName" placeholder="bijv. Emma" autocomplete="given-name" />
          <span class="field-error" id="firstNameError"></span>
        </div>
        <div class="name-field">
          <label for="lastName">Achternaam</label>
          <input type="text" id="lastName" placeholder="bijv. de Vries" autocomplete="family-name" />
          <span class="field-error" id="lastNameError"></span>
        </div>
      </div>
      <div class="nav-row" style="border-top:none; padding-top:0; margin-top:0;">
        <span></span>
        <button class="btn primary" onclick="submitName()">Start quiz &#8594;</button>
      </div>
    </div>
  `;
  document.getElementById('firstName').focus();
  document.getElementById('firstName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('lastName').focus();
  });
  document.getElementById('lastName').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitName();
  });
}

function submitName() {
  const first = document.getElementById('firstName').value.trim();
  const last = document.getElementById('lastName').value.trim();
  let valid = true;

  document.getElementById('firstNameError').textContent = '';
  document.getElementById('lastNameError').textContent = '';
  document.getElementById('firstName').classList.remove('input-error');
  document.getElementById('lastName').classList.remove('input-error');

  if (!first) {
    document.getElementById('firstNameError').textContent = 'Vul je voornaam in.';
    document.getElementById('firstName').classList.add('input-error');
    valid = false;
  }
  if (!last) {
    document.getElementById('lastNameError').textContent = 'Vul je achternaam in.';
    document.getElementById('lastName').classList.add('input-error');
    valid = false;
  }

  if (!valid) return;

  studentFirstName = first;
  studentLastName = last;
  render();
}

function renderQuestion(app) {
  const q = questions[current];
  const letters = ['A','B','C','D','E'];
  const pct = Math.round((current / questions.length) * 100);
  app.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Vraag ${current + 1} van ${questions.length}</span>
        <span>${pct}%</span>
      </div>
      <div class="progress-bg"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="question-body">
      <div class="q-text">${q.text}</div>
      <div class="options">
        ${q.options.map((o, i) => `
          <button class="option-btn ${answers[current] === i ? 'selected' : ''}" onclick="selectOption(${i})">
            <span class="option-letter">${letters[i]}</span>
            <span>${o.text}</span>
          </button>
        `).join('')}
      </div>
      <div class="nav-row">
        <button class="btn" onclick="go(-1)" ${current === 0 ? 'disabled' : ''}>&#8592; Terug</button>
        <button class="btn primary" onclick="go(1)" ${answers[current] === null ? 'disabled' : ''}>
          ${current === questions.length - 1 ? 'Bekijk resultaat &#8594;' : 'Volgende &#8594;'}
        </button>
      </div>
    </div>
  `;
}

function selectOption(i) {
  answers[current] = i;
  render();
}

function go(dir) {
  current = Math.max(0, Math.min(questions.length, current + dir));
  render();
}

function calcScores() {
  const scores = { se: 0, id: 0, bdm: 0, ism: 0, nse: 0 };
  questions.forEach((q, qi) => {
    const ai = answers[qi];
    if (ai === null) return;
    q.options[ai].tags.forEach(t => { scores[t] += 1; });
  });
  const total = Object.values(scores).reduce((a, b) => a + b, 0) || 1;
  return { scores, total };
}

function renderResult(app) {
  const { scores, total } = calcScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const top = sorted[0][0];
  const t = tracks[top];

  const cardsHTML = sorted.map(([key, score], idx) => {
    const tr = tracks[key];
    const pct = Math.round((score / total) * 100);
    const isTop = idx === 0;
    return `
      <div class="result-card ${isTop ? 'top' : ''}" style="${isTop ? 'border-color:' + tr.barColor : ''}">
        ${isTop ? '<span class="best-badge" style="background:' + tr.bg + ';color:' + tr.textColor + '">Beste match</span>' : ''}
        <div class="result-card-top-row">
          <div style="display:flex;align-items:center;">
            <span class="result-track-name">${tr.label}</span>
            <span class="result-track-code" style="background:${tr.bg};color:${tr.textColor}">${tr.code}</span>
          </div>
          <span class="result-pct" style="color:${tr.barColor}">${pct}%</span>
        </div>
        <div class="result-bar-bg">
          <div class="result-bar" id="bar-${key}" style="background:${tr.barColor}"></div>
        </div>
        <div class="location-tag">${tr.location}</div>
        ${isTop ? `
          <div class="result-desc" style="margin-top:8px;">${tr.desc}</div>
          <div class="skills-row">
            ${tr.skills.map(s => '<span class="skill-badge" style="background:' + tr.bg + ';color:' + tr.textColor + '">' + s + '</span>').join('')}
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  app.innerHTML = `
    <div class="result-wrap">
      <div class="result-intro">Jouw resultaat — ${escHtml(studentFirstName)} ${escHtml(studentLastName)}</div>
      <div class="result-headline">Je past het best bij <span>${t.label} (${t.code})</span></div>
      ${cardsHTML}
      <button class="download-btn" onclick="downloadRapport()">
        &#8659; Download jouw rapport (PDF)
      </button>
      <button class="restart-btn" onclick="restart()">&#8635; Opnieuw beginnen</button>
      <a class="haagse-link" href="https://www.dehaagsehogeschool.nl/opleidingen/hbo-bachelor/hbo-ict" target="_blank" rel="noopener">
        Meer info over HBO-ICT op De Haagse Hogeschool &#8594;
      </a>
    </div>
  `;

  setTimeout(() => {
    sorted.forEach(([key, score]) => {
      const pct = Math.round((score / total) * 100);
      const bar = document.getElementById('bar-' + key);
      if (bar) bar.style.width = pct + '%';
    });
  }, 80);
}

function downloadRapport() {
  const { scores, total } = calcScores();
  const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
  const topKey = sorted[0][0];
  const top = tracks[topKey];

  const now = new Date();
  const dateStr = now.toLocaleDateString('nl-NL', { day: '2-digit', month: 'long', year: 'numeric' });

  const scoresRowsHTML = sorted.map(([key, score], idx) => {
    const tr = tracks[key];
    const pct = Math.round((score / total) * 100);
    const isTop = idx === 0;
    return `
      <tr${isTop ? ' style="font-weight:600;"' : ''}>
        <td>
          <span class="rp-code-badge" style="background:${tr.bg};color:${tr.textColor}">${tr.code}</span>
          ${tr.label}${isTop ? ' &#9733;' : ''}
        </td>
        <td style="color:${tr.barColor};font-weight:600;">${pct}%</td>
        <td>
          <div class="rp-bar-bg">
            <div class="rp-bar-fill" style="width:${pct}%;background:${tr.barColor}"></div>
          </div>
        </td>
        <td style="font-size:11px;color:#6b7a99;">${tr.location.replace('Locatie: ', '')}</td>
      </tr>
    `;
  }).join('');

  const answersRowsHTML = questions.map((q, qi) => {
    const ai = answers[qi];
    const chosenText = ai !== null ? q.options[ai].text : '—';
    const tag = ai !== null ? q.options[ai].tags[0] : '';
    const tr = tag ? tracks[tag] : null;
    return `
      <tr>
        <td style="color:#6b7a99;width:32px;">${qi + 1}</td>
        <td>${q.text}</td>
        <td>${chosenText}</td>
        <td style="width:50px;">
          ${tr ? '<span class="rp-code-badge" style="background:' + tr.bg + ';color:' + tr.textColor + '">' + tr.code + '</span>' : ''}
        </td>
      </tr>
    `;
  }).join('');

  document.getElementById('rapport-page').innerHTML = `
    <div class="rp-header">
      <div class="rp-header-left">
        <h1>HBO-ICT Studiekeuze Rapport</h1>
        <p>De Haagse Hogeschool &bull; HBO-ICT</p>
      </div>
      <div class="rp-header-right">
        ali@rashidi.nl
      </div>
    </div>

    <div class="rp-student-box">
      <div class="rp-field">
        <label>Naam</label>
        <span>${escHtml(studentFirstName)} ${escHtml(studentLastName)}</span>
      </div>
      <div class="rp-field">
        <label>Datum</label>
        <span>${dateStr}</span>
      </div>
      <div class="rp-field">
        <label>Beste match</label>
        <span style="color:${top.color}">${top.code} &mdash; ${top.label}</span>
      </div>
    </div>

    <div class="rp-section-title">Beste match</div>
    <div class="rp-best-box" style="background:${top.color}">
      <div class="rp-best-eyebrow">&#10024; Beste Match &bull; ${top.code}</div>
      <div class="rp-best-title">${top.label}</div>
      <div class="rp-best-desc">${top.desc}</div>
      <div class="rp-best-meta">&#128205; ${top.location}</div>
      <div class="rp-skills-row">
        ${top.skills.map(s => '<span class="rp-skill-badge">' + s + '</span>').join('')}
      </div>
    </div>

    <div class="rp-section-title">Jouw profiel &mdash; alle richtingen</div>
    <table class="rp-scores-table">
      <thead>
        <tr>
          <th>Richting</th>
          <th>Score</th>
          <th>Balk</th>
          <th>Locatie</th>
        </tr>
      </thead>
      <tbody>${scoresRowsHTML}</tbody>
    </table>

    <div class="rp-answers-section">
      <div class="rp-section-title">Overzicht antwoorden</div>
      <table class="rp-answers-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Vraag</th>
            <th>Jouw antwoord</th>
            <th>Richting</th>
          </tr>
        </thead>
        <tbody>${answersRowsHTML}</tbody>
      </table>
    </div>

    <div class="rp-footer">
      <span>HBO-ICT Studiekeuze Quiz &bull; De Haagse Hogeschool</span>
      <span>${escHtml(studentFirstName)} ${escHtml(studentLastName)} &bull; ${dateStr}</span>
    </div>
  `;

  window.print();
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  studentFirstName = '';
  studentLastName = '';
  render();
}

render();
</script>
</body>
</html>
