<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBO-ICT Studiekeuze Quiz</title>
    <link rel="stylesheet" href="style.css?v=20260330-1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfTiTlX6kk+qitfevl/7LibUOeJWlt9rbyDn92a1DqWOw9vWG2MFoays0sgObmWazO5BQPiFucnnEAjpAB+/Sw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>

    <!-- SVG squiggles taken from https://codepen.io/lbebber/pen/KwGEQv -->
    <svg version="1.1" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="squiggly-0">
                <feTurbulence id="turbulence" baseFrequency="0.06" numOctaves="3" result="noise" seed="0"></feTurbulence>
                <feDisplacementMap id="displacement" in="SourceGraphic" in2="noise" scale="6"></feDisplacementMap>
            </filter>
            <filter id="squiggly-1">
                <feTurbulence id="turbulence" baseFrequency="0.06" numOctaves="3" result="noise" seed="1"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="8"></feDisplacementMap>
            </filter>
            <filter id="squiggly-2">
                <feTurbulence id="turbulence" baseFrequency="0.06" numOctaves="3" result="noise" seed="2"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"></feDisplacementMap>
            </filter>
            <filter id="squiggly-3">
                <feTurbulence id="turbulence" baseFrequency="0.06" numOctaves="3" result="noise" seed="3"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="8"></feDisplacementMap>
            </filter>
            <filter id="squiggly-4">
                <feTurbulence id="turbulence" baseFrequency="0.06" numOctaves="3" result="noise" seed="4"></feTurbulence>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="6"></feDisplacementMap>
            </filter>
        </defs>
    </svg>

    <!-- Grain and vignette -->
    <div class="overlay"></div>

    <!-- Rapport page: hidden on screen, visible only when printing -->
    <div id="rapport-page"></div>

    <!-- Main markup -->

    <div class="options">
        <div class="options_sf">
            <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/sfIcon2.png">
        </div>
        <div class="options_bg">
            <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/bgIcon2.png">
        </div>
    </div>

    <div class="main">
        <div class="main_inner">
            <div class="main_inner__loading">
                <div class="bg">
                    <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/mars_sunburst.png">
                </div>
                <div class="loader">
                    <div class="text">
                        <div class="intro-line intro-line--main">HBO-ICT</div>
                        <div class="intro-line intro-line--sub">Studiekeuze Quiz</div>
                    </div>
                    <p>
                        <button>Klik om te beginnen</button>
                    </p>
                </div>
            </div>
            <div class="main_inner__modalOverlay"></div>
            <div class="main_inner__modal"></div>
            <div class="main_inner__modalContent">
                <!-- Filled dynamically by JS -->
            </div>

            <!-- Pass the pen logo -->
            <div class="main_inner__logo">
                <a href="">
                    <img src="https://s3-us-west-2.amazonaws.com/s.cdpn.io/217233/vgqlogo.svg">
                </a>
            </div>

            <!-- Question counter -->
            <div class="main_inner__question_counter"></div>

            <!-- Question -->
            <div class="main_inner__title">
                <h1></h1>
                <p>Klik op een antwoord of gebruik de cijfertoetsen</p>
            </div>

            <!-- Scene circle backdrop -->
            <div class="main_inner__circle"></div>

            <!-- Scene right or wrong feedback -->
            <div class="main_inner__feedback"></div>

            <!-- Scene answers, generated through JS -->
            <div class="main_inner__answers"></div>

            <!-- Quiz progress element -->
            <div class="main_inner__breadcrumbs"></div>
        </div>
    </div>

    <canvas class="grain"></canvas>

    <style>
        /* ── Question counter ────────────────────────────────── */
        .main_inner__question_counter {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.95);
            background: rgba(0, 0, 0, 0.25);
            border-radius: 20px;
            padding: 4px 14px;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        /* ── Name modal ──────────────────────────────────────── */
        .name-modal-wrap {
            padding: 28px 28px 24px;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .name-modal-wrap h2 {
            font-size: 20px;
            font-weight: 700;
            color: #0a1a3b;
            margin-bottom: 8px;
        }
        .name-modal-wrap > p {
            font-size: 13px;
            color: #6b7a99;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .name-modal-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .name-modal-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .name-modal-field label {
            font-size: 11px;
            font-weight: 600;
            color: #6b7a99;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .name-modal-field input {
            padding: 10px 14px;
            border: 1.5px solid #dce4f0;
            border-radius: 10px;
            font-size: 15px;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        .name-modal-field input:focus { border-color: #1a6dc5; }
        .name-modal-field input.input-error { border-color: #c0392b; }
        .name-modal-field input::placeholder { color: #b0bcd4; }
        .name-modal-error {
            font-size: 11px;
            color: #c0392b;
            min-height: 16px;
        }
        .name-modal-submit {
            display: block;
            width: 100%;
            padding: 13px 20px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .name-modal-submit:hover { background: #0a0a1a; }

        .name-modal-over-ons {
            display: block;
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #6b7a99;
            text-decoration: none;
        }
        .name-modal-over-ons:hover { color: #1a6dc5; text-decoration: underline; }

        /* ── Download button in results ──────────────────────── */
        .res-download {
            display: block;
            width: 100%;
            padding: 13px 20px;
            background: #1a6dc5;
            color: #fff;
            border: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background 0.15s;
        }
        .res-download:hover { background: #0a3d6b; }

        /* ── Print / PDF rapport ─────────────────────────────── */
        #rapport-page { display: none; }

        @media print {
            body { background: #fff !important; padding: 0 !important;
                   display: block !important; font-family: 'Segoe UI', system-ui, sans-serif;
                   color: #1a1a2e; }
            #rapport-page { display: block !important; }
            .overlay, .options, .main, canvas { display: none !important; }
            @page { size: A4; margin: 18mm 18mm; }
        }

        .rp-header {
            display: flex; align-items: flex-start; justify-content: space-between;
            border-bottom: 3px solid #0a3d6b; padding-bottom: 12px; margin-bottom: 20px;
        }
        .rp-header-left h1 { font-size: 22px; font-weight: 700; color: #0a3d6b; margin-bottom: 2px; }
        .rp-header-left p  { font-size: 11px; color: #6b7a99; letter-spacing: 0.06em; text-transform: uppercase; }
        .rp-header-right   { text-align: right; font-size: 11px; color: #6b7a99; line-height: 1.7; }
        .rp-student-box {
            background: #f4f6fa; border-radius: 10px; padding: 14px 18px; margin-bottom: 20px;
            display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px;
        }
        .rp-field label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em;
                          color: #6b7a99; font-weight: 600; display: block; margin-bottom: 3px; }
        .rp-field span  { font-size: 14px; font-weight: 600; color: #0a1a3b; }
        .rp-section-title {
            font-size: 12px; font-weight: 700; color: #0a3d6b; text-transform: uppercase;
            letter-spacing: 0.08em; margin-bottom: 10px; padding-bottom: 5px;
            border-bottom: 1.5px solid #dce4f0;
        }
        .rp-best-box    { border-radius: 12px; padding: 16px 20px; margin-bottom: 18px; color: #fff; }
        .rp-best-eyebrow{ font-size: 10px; font-weight: 700; text-transform: uppercase;
                          letter-spacing: 0.1em; opacity: 0.85; margin-bottom: 4px; }
        .rp-best-title  { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .rp-best-desc   { font-size: 12px; opacity: 0.9; line-height: 1.6; margin-bottom: 10px; }
        .rp-best-meta   { font-size: 11px; opacity: 0.8; }
        .rp-skills-row  { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
        .rp-skill-badge { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 20px;
                          background: rgba(255,255,255,0.22); color: #fff; }
        .rp-scores-table{ width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 13px; }
        .rp-scores-table th { background: #0a3d6b; color: #fff; padding: 8px 12px; text-align: left;
                              font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
        .rp-scores-table td { padding: 9px 12px; border-bottom: 1px solid #eef1f8; vertical-align: middle; }
        .rp-scores-table tr:last-child td { border-bottom: none; }
        .rp-scores-table tr:nth-child(even) td { background: #f8fafd; }
        .rp-code-badge  { display: inline-block; font-size: 10px; font-weight: 700;
                          padding: 2px 8px; border-radius: 20px; margin-right: 6px; }
        .rp-bar-bg      { height: 8px; background: #e8ecf4; border-radius: 4px; overflow: hidden; width: 150px; }
        .rp-bar-fill    { height: 8px; border-radius: 4px; }
        .rp-answers-section { page-break-before: always; }
        .rp-answers-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .rp-answers-table th { background: #0a3d6b; color: #fff; padding: 7px 10px; text-align: left;
                               font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; font-size: 10px; }
        .rp-answers-table td { padding: 8px 10px; border-bottom: 1px solid #eef1f8;
                               vertical-align: top; line-height: 1.5; }
        .rp-answers-table tr:nth-child(even) td { background: #f8fafd; }
        .rp-footer { margin-top: 24px; padding-top: 10px; border-top: 1px solid #dce4f0;
                     display: flex; justify-content: space-between; font-size: 10px; color: #9ba8c4; }

        /* Staggered slide-in transitions for answer options 4 and 5 */
        body .main_inner__answers .answer:nth-of-type(4) {
            transition: text-indent 0.12s, left 0.2s 0.2857142857s, opacity 0.2s 0.2857142857s;
        }
        body .main_inner__answers .answer:nth-of-type(5) {
            transition: text-indent 0.12s, left 0.2s 0.3571428571s, opacity 0.2s 0.3571428571s;
        }
    </style>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js" integrity="sha256-/xUj+3OJU5yExlq6GSYGSHk7tPXikynS7ogEvDej/m4=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js?v=20260330-1"></script>
</body>
</html>
